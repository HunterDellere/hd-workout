<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#13110E" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="HDW — a daily practice. A reference and logbook for push, pull, legs, and core. Every pattern, every cue, every variant." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HDW" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Pre-paint theme attr to prevent FOUC. Light is the default. -->
    <script>
      (function () {
        try {
          var k = 'hd:theme';
          var v = localStorage.getItem(k);
          if (v === 'light' || v === 'dark') {
            document.documentElement.setAttribute('data-theme', v);
          }
        } catch (e) { /* noop */ }
      })();
    </script>

    <title>HDW — A daily practice</title>

    <style>
      /* Pre-paint background — warm paper. Prevents white flash before the
         token CSS lands and matches the light-mode --surface-page value. */
      html, body { background: #FAF7F2; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]), body { background: #13110E; }
      }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #13110E; }
      #root:empty::before {
        content: "";
        display: block;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
