<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="APEX">
  <rect width="512" height="512" rx="96" fill="#080808"/>
  <g transform="translate(256 268)">
    <!-- abstract apex / mountain mark made of three rising bars -->
    <rect x="-150" y="-10" width="40" height="120" rx="6" fill="#3CD4F5"/>
    <rect x="-80"  y="-70" width="40" height="180" rx="6" fill="#D4F53C"/>
    <rect x="-10"  y="-140" width="40" height="250" rx="6" fill="#F5833C"/>
    <rect x="60"   y="-70" width="40" height="180" rx="6" fill="#C43CF5"/>
    <rect x="130"  y="-10" width="20" height="120" rx="4" fill="#F2F2F2"/>
  </g>
  <g font-family="'Bebas Neue', Impact, sans-serif" fill="#F2F2F2" text-anchor="middle">
    <text x="256" y="430" font-size="64" letter-spacing="8">APEX</text>
  </g>
</svg>
