<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4EFE3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0907" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="HDW — a training notebook. Push, pull, legs, core — written down." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HDW" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Fonts: self-hosted via @fontsource/*, imported in src/main.jsx.
         Vite emits the woff2 binaries into dist/assets and the PWA
         precache picks them up, so "fully offline" actually means it now. -->

    <!-- Pre-paint theme attr to prevent FOUC. Light is the default. -->
    <script>
      (function () {
        try {
          var k = 'hd:theme';
          var v = localStorage.getItem(k);
          if (v === 'light' || v === 'dark') {
            document.documentElement.setAttribute('data-theme', v);
          }
        } catch (e) { /* noop */ }
      })();
    </script>

    <title>HDW</title>

    <style>
      /* Pre-paint background — warm paper. Prevents white flash before the
         token CSS lands and matches the light-mode --surface-page value
         from src/design-system/tokens.js. Keep these two hexes in sync. */
      html, body { background: #F4EFE3; }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]), body { background: #0B0907; }
      }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #0B0907; }
      #root:empty::before {
        content: "";
        display: block;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
